<footer class="site-footer">
  <div class="site-footer__inner">
    <nav i18n-aria-label="@@footer.navAriaLabel" aria-label="Footer-Navigation">
      <ul>
        @for (item of navItems; track item.label) {
          <li>
            <a
              href="/#{{ item.fragment }}"
              (click)="$event.preventDefault(); navigateToSection(item.fragment)"
              >{{ item.label }}</a
            >
          </li>
        }
      </ul>
    </nav>

    <div class="site-footer__legal">
      <a routerLink="/blog" i18n="@@footer.allBlogs">Alle Blogs</a>
      <a routerLink="/services" i18n="@@footer.allServices">Gesamtes Angebot</a>
      <a routerLink="/datenschutz" i18n="@@footer.privacy">Datenschutzerklärung</a>
    </div>

    <p class="site-footer__copyright">&copy; {{ year }} Angular Atelier</p>
  </div>
</footer>
