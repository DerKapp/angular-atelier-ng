<footer class="site-footer">
  <div class="site-footer__inner">
    <nav aria-label="Footer-Navigation">
      <ul>
        @for (item of navItems; track item.label) {
          <li>
            <a
              href="/#{{ item.fragment }}"
              (click)="$event.preventDefault(); navigateToSection(item.fragment)"
              >{{ item.label }}</a
            >
          </li>
        }
      </ul>
    </nav>

    <div class="site-footer__legal">
      <a routerLink="/blog">Alle Blogs</a>
      <a routerLink="/services">Gesamtes Angebot</a>
      <a routerLink="/datenschutz">Datenschutzerklärung</a>
    </div>

    <p class="site-footer__copyright">&copy; {{ year }} Angular Atelier</p>
  </div>
</footer>
