<header class="site-header">
  <div class="site-header__bar">
    <a
      class="site-header__logo"
      href="/#home"
      (click)="$event.preventDefault(); navigateToSection('home')"
      i18n-aria-label="@@header.logoAria"
      aria-label="Angular Atelier – zur Startseite"
    >
      <span class="site-header__mark" aria-hidden="true">[()]</span>
      <span class="site-header__wordmark">Angular Atelier</span>
    </a>

    <nav
      class="site-header__nav site-header__nav--full"
      i18n-aria-label="@@nav.ariaLabel"
      aria-label="Hauptnavigation"
    >
      <ul>
        @for (item of navItems; track item.label) {
          <li>
            <a
              href="/#{{ item.fragment }}"
              (click)="$event.preventDefault(); navigateToSection(item.fragment)"
              [class.is-active]="activeSection() === item.fragment"
              [attr.aria-current]="activeSection() === item.fragment ? 'true' : null"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="site-header__actions">
      <app-language-switcher class="site-header__lang" />

      <a
        href="/#contact"
        (click)="$event.preventDefault(); navigateToSection('contact')"
        class="site-header__cta"
        i18n="@@header.cta"
      >
        Kontakt aufnehmen
      </a>

      <button
        #toggleButton
        type="button"
        class="site-header__toggle"
        (click)="toggleMenu()"
        aria-controls="mobile-menu"
        [attr.aria-expanded]="menuOpen()"
        [attr.aria-label]="menuToggleLabel()"
      >
        <span class="site-header__toggle-label" aria-hidden="true">{{ toggleVisibleLabel() }}</span>
        <span class="site-header__toggle-icon" aria-hidden="true">
          @if (menuOpen()) {
            <span class="site-header__toggle-close">×</span>
          } @else {
            <span></span>
            <span></span>
            <span></span>
          }
        </span>
      </button>
    </div>
  </div>

  <app-mobile-menu
    [open]="menuOpen()"
    [navItems]="navItems"
    [activeSection]="activeSection()"
    (navigate)="navigateToSection($event)"
    (closeRequested)="closeMenu()"
  />
</header>
