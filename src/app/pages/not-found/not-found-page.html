<section class="not-found" aria-labelledby="not-found-heading">
  <div class="not-found__inner">
    <p class="not-found__code" aria-hidden="true">404</p>
    <h1 id="not-found-heading" i18n="@@notFound.heading">Seite nicht gefunden</h1>
    <p i18n="@@notFound.body">
      Die aufgerufene Seite existiert leider nicht oder wurde verschoben. Vielleicht hilft Ihnen
      einer dieser Links weiter.
    </p>
    <a class="btn btn--primary" routerLink="/" i18n="@@notFound.backLink">Zurück zur Startseite</a>
  </div>
</section>
