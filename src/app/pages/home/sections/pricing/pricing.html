<section id="pricing" class="pricing" aria-labelledby="pricing-heading">
  <div class="pricing__panel">
    <div class="pricing__intro">
      <h2 id="pricing-heading" i18n="@@pricing.heading">Preise</h2>
      <p i18n="@@pricing.intro">
        Transparenz ist uns wichtig – deshalb sehen Sie hier unsere Preise auf einen Blick.
      </p>
    </div>
    <div class="pricing__badge">
      <p class="pricing__badge-label" i18n="@@pricing.hourlyLabel">Stundenansatz</p>
      <p class="pricing__badge-value" i18n="@@pricing.hourlyValue">ab CHF 200.–</p>
      <p class="pricing__badge-note" i18n="@@pricing.vatNote">exkl. MWST.</p>
    </div>
  </div>
</section>
