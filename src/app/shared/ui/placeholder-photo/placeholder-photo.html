<div class="placeholder-photo" role="img" [attr.aria-label]="ariaLabel()">
  @if (compact()) {
    <span class="visually-hidden" i18n="@@placeholderPhoto.caption">Foto folgt: {{ label() }}</span>
  } @else {
    <span class="placeholder-photo__caption" i18n="@@placeholderPhoto.caption"
      >Foto folgt: {{ label() }}</span
    >
  }
</div>
